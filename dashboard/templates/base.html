<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Importil Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a1a;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --accent:    #4f8ef7;
      --accent-h:  #3a7ae0;
      --green:     #2ecc71;
      --red:       #e74c3c;
      --yellow:    #f39c12;
      --text:      #e8eaf0;
      --muted:     #8890aa;
      --radius:    8px;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar (glassmorphism) ── */
    nav {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 28px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .nav-brand span {
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
      margin-left: 6px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--radius);
      transition: background 0.15s, color 0.15s;
      font-weight: 500;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .nav-logout a {
      color: var(--red);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-weight: 500;
      transition: background 0.15s;
    }

    .nav-logout a:hover { background: rgba(255,255,255,0.08); }

    /* ── Hamburger (hidden on desktop) ── */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      margin-left: auto;
      line-height: 1;
    }

    /* ── Mobile slide-out overlay ── */
    #nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }

    #nav-overlay.open { display: block; }

    #mobile-menu {
      position: fixed;
      top: 0;
      right: -50vw;
      width: 50vw;
      min-width: 200px;
      height: 100vh;
      background: rgba(8,10,24,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 300;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 72px 16px 32px;
    }

    #mobile-menu.open { right: 0; }

    .mobile-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .mobile-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }

    .mobile-links a:hover,
    .mobile-links a.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .mobile-logout a {
      color: var(--red);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 15px;
      display: block;
      transition: background 0.15s;
    }

    .mobile-logout a:hover { background: rgba(255,255,255,0.06); }

    /* ── Main layout ── */
    main {
      flex: 1;
      padding: 32px 28px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }

    /* ── Cards (glassmorphism) ── */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.04); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-green  { background: rgba(46,204,113,.15); color: var(--green); }
    .badge-red    { background: rgba(231,76,60,.15);  color: var(--red); }
    .badge-yellow { background: rgba(243,156,18,.15); color: var(--yellow); }
    .badge-grey   { background: rgba(136,144,170,.12); color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, box-shadow 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn-green { background: var(--green);  color: #fff; }
    .btn-red   { background: var(--red);    color: #fff; }
    .btn-blue  { background: var(--accent); color: #fff; }
    .btn-green:hover { box-shadow: 0 0 14px rgba(46,204,113,0.45); }
    .btn-red:hover   { box-shadow: 0 0 14px rgba(231,76,60,0.45); }
    .btn-blue:hover  { box-shadow: 0 0 14px rgba(79,142,247,0.45); }

    /* ── Flash messages ── */
    .flash {
      background: rgba(79,142,247,0.1);
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
    }

    /* ── Muted / helper text ── */
    .muted { color: var(--muted); }
    .mono  { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }

    /* ── Mobile breakpoint ── */
    @media (max-width: 640px) {
      nav {
        padding: 0 16px;
        gap: 0;
      }

      .nav-brand { flex: 1; }

      .nav-links,
      .nav-logout { display: none; }

      .nav-toggle { display: block; }

      main { padding: 20px 16px; }

      h1 { font-size: 18px; margin-bottom: 18px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">🛃 Importil <span>by Drivetech360</span></a>
  <div class="nav-links">
    <a href="/"         {% if request.path == '/'         %}class="active"{% endif %}>Dashboard</a>
    <a href="/users"    {% if request.path == '/users'    %}class="active"{% endif %}>Users</a>
    <a href="/history"  {% if request.path == '/history'  %}class="active"{% endif %}>History</a>
    <a href="/settings" {% if request.path == '/settings' %}class="active"{% endif %}>Settings</a>
  </div>
  <div class="nav-logout"><a href="/logout">Logout</a></div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation">&#9776;</button>
</nav>

<div id="nav-overlay"></div>
<aside id="mobile-menu">
  <div class="mobile-links">
    <a href="/"         {% if request.path == '/'         %}class="active"{% endif %}>Dashboard</a>
    <a href="/users"    {% if request.path == '/users'    %}class="active"{% endif %}>Users</a>
    <a href="/history"  {% if request.path == '/history'  %}class="active"{% endif %}>History</a>
    <a href="/settings" {% if request.path == '/settings' %}class="active"{% endif %}>Settings</a>
  </div>
  <div class="mobile-logout"><a href="/logout">Logout</a></div>
</aside>

<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    var toggle  = document.getElementById('nav-toggle');
    var menu    = document.getElementById('mobile-menu');
    var overlay = document.getElementById('nav-overlay');

    function openMenu() {
      menu.classList.add('open');
      overlay.classList.add('open');
    }

    function closeMenu() {
      menu.classList.remove('open');
      overlay.classList.remove('open');
    }

    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menu.classList.contains('open') ? closeMenu() : openMenu();
    });

    overlay.addEventListener('click', closeMenu);

    document.addEventListener('click', function (e) {
      if (menu.classList.contains('open') && !menu.contains(e.target)) {
        closeMenu();
      }
    });
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Importil Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:            #080c14;
      --bg2:           #0d1520;
      --surface:       rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.08);
      --accent:        #3b82f6;
      --accent-glow:   rgba(59,130,246,0.3);
      --green:         #10b981;
      --red:           #ef4444;
      --amber:         #f59e0b;
      --text:          #f1f5f9;
      --text-muted:    #64748b;
      --radius:        10px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) var(--bg); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: rgba(8,12,20,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.2px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 9px;
      margin-right: 36px;
    }

    .nav-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow), 0 0 18px var(--accent-glow);
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      flex: 1;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 14px;
      font-weight: 400;
      font-size: 14px;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 14px;
      right: 14px;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s ease;
      border-radius: 1px 1px 0 0;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after,
    .nav-links a.active::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--text); }

    .nav-logout a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 14px;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-logout a:hover { color: var(--red); }

    /* ── Hamburger ── */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      margin-left: auto;
      flex-direction: column;
      gap: 5px;
      align-items: center;
      justify-content: center;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.25s ease;
    }

    /* ── Overlay ── */
    #nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 200;
    }

    #nav-overlay.open { display: block; }

    /* ── Mobile slide-out (RIGHT, 70vw) ── */
    #mobile-menu {
      position: fixed;
      top: 0;
      right: -70vw;
      width: 70vw;
      height: 100vh;
      background: rgba(8,12,20,0.98);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      z-index: 300;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }

    #mobile-menu.open { right: 0; }

    .mobile-links {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .mobile-links a {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      padding: 16px 28px;
      border-left: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .mobile-links a:hover {
      color: var(--text);
      background: var(--surface-hover);
      border-left-color: rgba(59,130,246,0.4);
    }

    .mobile-links a.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(59,130,246,0.06);
    }

    .mobile-logout {
      padding: 20px 25px 40px;
    }

    .mobile-logout a {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--red);
      text-decoration: none;
      display: block;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .mobile-logout a:hover { opacity: 1; }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 36px 32px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    h2 {
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 10px 16px;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 14px;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-hover); }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .badge-green {
      background: rgba(16,185,129,0.12);
      color: var(--green);
      box-shadow: 0 0 12px rgba(16,185,129,0.12);
    }

    .badge-red {
      background: rgba(239,68,68,0.12);
      color: var(--red);
      box-shadow: 0 0 12px rgba(239,68,68,0.12);
    }

    .badge-amber {
      background: rgba(245,158,11,0.12);
      color: var(--amber);
      box-shadow: 0 0 12px rgba(245,158,11,0.12);
    }

    .badge-blue {
      background: rgba(59,130,246,0.12);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(59,130,246,0.12);
    }

    .badge-grey {
      background: rgba(100,116,139,0.1);
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: box-shadow 0.2s, opacity 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { box-shadow: 0 0 20px rgba(16,185,129,0.5); }

    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { box-shadow: 0 0 20px rgba(239,68,68,0.5); }

    .btn-blue { background: var(--accent); color: #fff; }
    .btn-blue:hover { box-shadow: 0 0 20px var(--accent-glow); }

    /* ── Flash ── */
    .flash {
      background: rgba(59,130,246,0.08);
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
    }

    .muted { color: var(--text-muted); }
    .mono  { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-brand { margin-right: 0; }
      .nav-links, .nav-logout { display: none; }
      .nav-toggle { display: flex; }
      main { padding: 24px 16px; }
      h1 { font-size: 20px; margin-bottom: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <span class="nav-brand-dot"></span>
    Importil
  </a>
  <div class="nav-links">
    <a href="/"         {% if request.path == '/'         %}class="active"{% endif %}>Dashboard</a>
    <a href="/users"    {% if request.path == '/users'    %}class="active"{% endif %}>Users</a>
    <a href="/history"  {% if request.path == '/history'  %}class="active"{% endif %}>History</a>
    <a href="/settings" {% if request.path == '/settings' %}class="active"{% endif %}>Settings</a>
  </div>
  <div class="nav-logout"><a href="/logout">Logout</a></div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
</nav>

<div id="nav-overlay"></div>
<aside id="mobile-menu">
  <div class="mobile-links">
    <a href="/"         {% if request.path == '/'         %}class="active"{% endif %}>Dashboard</a>
    <a href="/users"    {% if request.path == '/users'    %}class="active"{% endif %}>Users</a>
    <a href="/history"  {% if request.path == '/history'  %}class="active"{% endif %}>History</a>
    <a href="/settings" {% if request.path == '/settings' %}class="active"{% endif %}>Settings</a>
  </div>
  <div class="mobile-logout"><a href="/logout">Logout</a></div>
</aside>

<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    var toggle  = document.getElementById('nav-toggle');
    var menu    = document.getElementById('mobile-menu');
    var overlay = document.getElementById('nav-overlay');

    function openMenu() {
      menu.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      menu.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menu.classList.contains('open') ? closeMenu() : openMenu();
    });

    overlay.addEventListener('click', closeMenu);

    document.addEventListener('click', function (e) {
      if (menu.classList.contains('open') && !menu.contains(e.target) && e.target !== toggle) {
        closeMenu();
      }
    });
  })();
</script>

</body>
</html>

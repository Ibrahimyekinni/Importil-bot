<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importil — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #080c14;
      color: #f1f5f9;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated gradient mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(59,130,246,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(168,85,247,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(16,185,129,0.08) 0%, transparent 50%);
      animation: mesh 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes mesh {
      0%   { opacity: 0.6; transform: scale(1) translateY(0); }
      50%  { opacity: 1;   transform: scale(1.06) translateY(-12px); }
      100% { opacity: 0.7; transform: scale(1.02) translateY(6px); }
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }

    .login-box {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 52px 44px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 10px rgba(59,130,246,0.5), 0 0 24px rgba(59,130,246,0.3);
      margin: 0 auto 20px;
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 36px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 14px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #64748b;
      margin-bottom: 7px;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 13px 16px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15), 0 0 20px rgba(59,130,246,0.1);
    }

    input[type="password"]::placeholder { color: #475569; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: box-shadow 0.2s, opacity 0.15s;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .submit-btn:hover {
      box-shadow: 0 0 24px rgba(59,130,246,0.45), 0 4px 16px rgba(59,130,246,0.2);
    }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #ef4444;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      text-align: left;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.3px;
    }

    @media (max-width: 440px) {
      .login-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-dot"></div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Importil Admin · Drivetech360</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter admin password"
          autofocus
          required
        />
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <div class="footer-note">Authorised personnel only</div>
  </div>
</div>

</body>
</html>
